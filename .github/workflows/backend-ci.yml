name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: eza-v5/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CI-safe test suite
        env:
          EZA_ENV: "ci"
        run: |
          python -m pytest tests_core \
            tests/test_sensitive_content.py \
            tests/test_conversation_groups.py \
            tests/test_mirror_network.py \
            tests/test_mirror_network_publish.py \
            tests/test_mirror_network_impact.py \
            tests/test_mirror_network_parent_lineage.py \
            tests/test_mirror_network_discover.py \
            tests/test_mirror_continuation_proof.py \
            tests/test_mirror_viral_loop_qa.py \
            tests/test_mirror_scene_asset_store.py \
            tests/test_mirror_scene_asset_config.py \
            tests/test_mirror_openai_provider.py \
            tests/test_mirror_generate_scene.py \
            tests/test_mirror_sohbet_session.py \
            tests/test_mirror_meaning_analysis.py \
            tests/test_mirror_director_draft.py \
            tests/test_mirror_director_prepare.py \
            tests/test_mirror_conversation_context_d1.py \
            tests/test_mirror_interpretation_d2.py \
            tests/test_mirror_director_mode.py \
            tests/test_mirror_director_hardening.py \
            tests/test_account_entitlements.py \
            tests/test_account_usage_service.py \
            tests/test_message_quota_guard.py \
            tests/test_visual_quota_guard.py \
            tests/test_discover_quota_guard.py \
            tests/test_relationship_map_access.py \
            tests/test_visual_source.py \
            tests/test_consume_usage_atomic.py \
            -q --disable-warnings
