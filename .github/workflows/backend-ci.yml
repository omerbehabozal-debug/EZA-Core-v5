name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: eza-v5/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CI-safe test suite
        env:
          EZA_ENV: "ci"
        run: |
          python -m pytest tests_core \
            tests/test_sensitive_content.py \
            tests/test_conversation_groups.py \
            tests/test_mirror_network.py \
            tests/test_mirror_network_publish.py \
            tests/test_mirror_network_impact.py \
            tests/test_mirror_network_parent_lineage.py \
            tests/test_mirror_continuation_proof.py \
            tests/test_mirror_viral_loop_qa.py \
            -q --disable-warnings
